spring:
  application:
    name: chatchat
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/chatchat_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:chat}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update # 개발 편의를 위해 update로 변경
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  jwt:
    secret: "your-super-secret-key-that-is-long-enough-to-be-secure"
    expiration: 86400000 # 24시간 (밀리초 단위)