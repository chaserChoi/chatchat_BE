version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: chatchat-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: chatchat_db
      MYSQL_USER: chat
      MYSQL_PASSWORD: 1234
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql # 컨테이너 최초 실행 시 스키마 자동 적용

volumes:
  mysql_data: